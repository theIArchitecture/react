<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <title>IArchitecture Voting Analysis - /</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
    .container { max-width: 1300px; margin: 0 auto; background: white; padding: 24px; border-radius: 8px; }
    nav a { margin-right: 12px; color: #2563eb; text-decoration: none; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #e2e8f0; font-size: 12px; }
    th { background: #f8fafc; }
  </style>
</head><body>
  <div class="container">
    <h1>Voting Analysis</h1>
    <div><strong>Cycle:</strong> <span id="cycle"></span></div>
    <nav style="margin-top:10px;">
      <a href="./governance.html">Governance Summary</a>
      <a href="./governance-efficacy.html">Rule Efficacy</a>
      <a href="./governance-voting.html">Voting Analysis</a>
      <a href="./governance-ledger.html">Governance Ledger</a>
    </nav>
    <h2>Confidence Distribution</h2>
    <canvas id="hist" style="max-height:260px;"></canvas>
    <h2>Cluster Voting Breakdown</h2>
    <table>
      <thead><tr><th>Cluster</th><th>Type</th><th>Confidence</th><th>Weighted</th><th>Propose</th><th>Suppressed</th><th>Narrative</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <script>
    const cycleMeta = {};
    const voting = [];
    document.getElementById('cycle').textContent = cycleMeta.cycle_number ?? '-';

    const bins = [0,0,0,0,0];
    for (const v of voting) {
      const c = Number(v.confidence_score ?? 0);
      const idx = Math.min(4, Math.floor(c * 5));
      bins[idx] += 1;
    }
    new Chart(document.getElementById('hist').getContext('2d'), {
      type: 'bar',
      data: { labels: ['0.0-0.2','0.2-0.4','0.4-0.6','0.6-0.8','0.8-1.0'], datasets: [{ label: 'Clusters', data: bins, backgroundColor: '#6366f1' }] }
    });

    const sorted = [...voting].sort((a,b) => Number(b.confidence_score ?? 0) - Number(a.confidence_score ?? 0));
    document.getElementById('rows').innerHTML = sorted.map(v => `
      <tr>
        <td>${v.cluster_id || '-'}</td>
        <td>${v.anomaly_type || '-'}</td>
        <td>${Number(v.confidence_score ?? 0).toFixed(3)}</td>
        <td>${Number(v.votes?.weighted_total ?? 0).toFixed(3)}</td>
        <td>${v.should_propose ? 'Yes' : 'No'}</td>
        <td>${v.suppressed_reason || '-'}</td>
        <td>${v.narrative || '-'}</td>
      </tr>`).join('');
  </script>
</body></html>
