<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <title>IArchitecture Rule Efficacy - /</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
    .container { max-width: 1200px; margin: 0 auto; background: white; padding: 24px; border-radius: 8px; }
    nav a { margin-right: 12px; color: #2563eb; text-decoration: none; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
    th { background: #f8fafc; }
  </style>
</head><body>
  <div class="container">
    <h1>Rule Efficacy</h1>
    <div><strong>Cycle:</strong> <span id="cycle"></span></div>
    <nav style="margin-top:10px;">
      <a href="./governance.html">Governance Summary</a>
      <a href="./governance-efficacy.html">Rule Efficacy</a>
      <a href="./governance-voting.html">Voting Analysis</a>
      <a href="./governance-ledger.html">Governance Ledger</a>
    </nav>
    <h2>Rating Distribution</h2>
    <canvas id="ratingChart" style="max-height:280px;"></canvas>
    <h2>Rules</h2>
    <table>
      <thead><tr><th>Rule</th><th>Cluster</th><th>Cycles</th><th>Entropy Delta</th><th>Rating</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <script>
    const cycleMeta = {};
    const efficacy = [];
    document.getElementById('cycle').textContent = cycleMeta.cycle_number ?? '-';
    const counts = {};
    for (const e of efficacy) {
      const r = String(e.rating || 'unknown');
      counts[r] = (counts[r] || 0) + 1;
    }
    new Chart(document.getElementById('ratingChart').getContext('2d'), {
      type: 'bar',
      data: { labels: Object.keys(counts), datasets: [{ label: 'Rules', data: Object.values(counts), backgroundColor: '#0ea5e9' }] }
    });
    const sorted = [...efficacy].sort((a,b) => Number(a.entropy_delta ?? 0) - Number(b.entropy_delta ?? 0));
    document.getElementById('rows').innerHTML = sorted.map(e => `
      <tr>
        <td>${e.rule_id || '-'}</td>
        <td>${e.cluster_id || '-'}</td>
        <td>${e.cycles_since_injection ?? '-'}</td>
        <td>${Number(e.entropy_delta ?? 0).toFixed(4)}</td>
        <td>${e.rating || '-'}</td>
      </tr>`).join('');
  </script>
</body></html>
