name: IArchitecture Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.cs'
      - '**.java'
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.cpp'
      - '**.cu'
      - '**.cuh'
  push:
    branches:
      - main
      - master

jobs:
  validate-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger and Wait for IArchHub Validation
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.IARCHITECTURE_PAT }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const prHeadRef = context.payload.pull_request.head.ref;
            const prBaseRef = context.payload.pull_request.base.ref;
            const customer  = context.payload.repository.name;

            console.log(`Triggering validation for PR #${prNumber} (customer: ${customer})`);

            const triggerResponse = await github.rest.actions.createWorkflowDispatch({
              owner: 'theIArchitecture',
              repo: 'IArchHub',
              workflow_id: 'iarchitecture-validation.yml',
              ref: 'main',
              inputs: {
                customer:    customer,
                pr_number:   prNumber.toString(),
                pr_head_ref: prHeadRef,
                pr_base_ref: prBaseRef
              }
            });

            console.log('Validation triggered, waiting for workflow to start...');

            await new Promise(resolve => setTimeout(resolve, 5000));

            let workflowRun = null;
            let attempts = 0;
            const maxAttempts = 60; // 5 minutes max (5 second intervals)

            while (attempts < maxAttempts) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: 'theIArchitecture',
                repo: 'IArchHub',
                workflow_id: 'iarchitecture-validation.yml',
                event: 'workflow_dispatch',
                per_page: 10
              });

              workflowRun = runs.data.workflow_runs.find(run =>
                run.status !== 'completed' ||
                (new Date() - new Date(run.created_at) < 60000)
              );

              if (workflowRun && workflowRun.status === 'completed') { break; }
              if (workflowRun) { console.log(`Workflow status: ${workflowRun.status}`); }

              await new Promise(resolve => setTimeout(resolve, 5000));
              attempts++;
            }

            if (!workflowRun) {
              core.setFailed('Could not find triggered workflow run');
              return;
            }

            console.log(`Workflow completed with conclusion: ${workflowRun.conclusion}`);
            console.log(`View run: ${workflowRun.html_url}`);

            if (workflowRun.conclusion === 'success') {
              console.log('Validation passed - no architectural violations found');
            } else if (workflowRun.conclusion === 'failure') {
              core.setFailed('Validation failed - architectural violations found. Check IArchHub validation results.');
            } else if (workflowRun.conclusion === 'cancelled') {
              core.setFailed('Validation was cancelled');
            } else {
              core.setFailed(`Validation completed with unexpected status: ${workflowRun.conclusion}`);
            }

  trigger-post-merge:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger post-merge workflow for PR merges
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.IARCHITECTURE_PAT }}
          script: |
            const commitMessage = context.payload.head_commit.message;
            const isPRMerge = commitMessage.includes('Merge pull request') ||
                             context.payload.head_commit.author.username === 'web-flow';

            if (isPRMerge) {
              await github.rest.repos.createDispatchEvent({
                owner: 'theIArchitecture',
                repo: 'IArchHub',
                event_type: 'full-scan',
                client_payload: {
                  customer:       context.payload.repository.name,
                  ref:            context.ref,
                  repository:     context.payload.repository.full_name,
                  commit_sha:     context.payload.head_commit.id,
                  commit_message: commitMessage
                }
              });
              console.log(`Triggered full-scan for ${context.ref} (PR merge detected)`);
            } else {
              console.log('Direct push detected - bypass detection and .iarch change triggers will handle this');
            }
