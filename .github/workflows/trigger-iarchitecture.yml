name: IArchitecture Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
      - master

jobs:
  validate-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger IArchHub Validation
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.IARCHITECTURE_PAT }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const prHeadRef = context.payload.pull_request.head.ref;
            const prBaseRef = context.payload.pull_request.base.ref;
            const customer  = context.payload.repository.name;

            console.log(`Triggering validation for PR #${prNumber} (customer: ${customer})`);

            await github.rest.actions.createWorkflowDispatch({
              owner: 'theIArchitecture',
              repo: 'IArchHub',
              workflow_id: 'iarchitecture-validation.yml',
              ref: 'main',
              inputs: {
                customer:    customer,
                pr_number:   prNumber.toString(),
                pr_head_ref: prHeadRef,
                pr_base_ref: prBaseRef
              }
            });

            console.log('Validation triggered — IArchHub will post check results directly to this PR.');

  trigger-post-merge:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger post-merge workflow for PR merges
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.IARCHITECTURE_PAT }}
          script: |
            const commitMessage = context.payload.head_commit.message;
            const isPRMerge = commitMessage.includes('Merge pull request') ||
                             context.payload.head_commit.author.username === 'web-flow';

            if (isPRMerge) {
              await github.rest.repos.createDispatchEvent({
                owner: 'theIArchitecture',
                repo: 'IArchHub',
                event_type: 'full-scan',
                client_payload: {
                  customer:       context.payload.repository.name,
                  ref:            context.ref,
                  repository:     context.payload.repository.full_name,
                  commit_sha:     context.payload.head_commit.id,
                  commit_message: commitMessage
                }
              });
              console.log(`Triggered full-scan for ${context.ref} (PR merge detected)`);
            } else {
              console.log('Direct push detected - bypass detection and .iarch change triggers will handle this');
            }
