name: Smoke Test — Slack

# Verifies: Slack connectivity. Posts one test message to the configured channel.
# Uses hub-level MESSAGING_* secrets (same as general notification workflows).

on:
  workflow_dispatch:

jobs:
  smoke-slack:
    runs-on: ${{ fromJSON(vars.RUNNER_WINDOWS) }}

    env:
      MESSAGING_WEBHOOK_URL: ${{ secrets.MESSAGING_WEBHOOK_URL }}

    steps:
      - name: Checkout IArchHub
        uses: actions/checkout@v4

      - name: Run Slack smoke
        run: |
          .\binaries\IArch.exe --pipeline smoke-slack --source-path .
        shell: powershell

      - name: Summary
        if: always()
        run: |
          $status = if ($LASTEXITCODE -eq 0) { "PASS" } else { "FAIL (exit $LASTEXITCODE)" }
          "## Smoke Test — Slack`n`n**Result:** $status`n`nCheck your Slack channel for a message from IArch." >> $env:GITHUB_STEP_SUMMARY
        shell: powershell
