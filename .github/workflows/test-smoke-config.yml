name: Smoke Test - Config

# Verifies: IArch starts, config resolves, context-dump runs.
# No secrets required. Safe to run at any time.

on:
  workflow_dispatch:

jobs:
  smoke-config:
    runs-on: ${{ fromJSON(vars.RUNNER_WINDOWS) }}

    steps:
      - name: Checkout IArchHub
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.IARCHITECTURE_PAT }}

      - name: Checkout customer repo
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.TARGET_ORG }}/${{ vars.TARGET_REPO }}
          path: vendor-code/${{ vars.TARGET_REPO }}
          token: ${{ secrets.IARCHITECTURE_PAT }}

      - name: Run config smoke
        run: |
          $spokePath = "vendor-code\${{ vars.TARGET_REPO }}"
          .\binaries\IArch.exe `
            --pipeline             smoke-config `
            --source-path          $spokePath `
            --bundled-defaults-path .iarch
        shell: powershell

      - name: Summary
        if: always()
        run: |
          $status = if ($LASTEXITCODE -eq 0) { "PASS" } else { "FAIL (exit $LASTEXITCODE)" }
          "## Smoke Test - Config`n`n**Result:** $status" >> $env:GITHUB_STEP_SUMMARY
        shell: powershell
